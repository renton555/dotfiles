# Change prefix from Ctrl+b to Ctrl+a --- PREFIX CONFIGURATION ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config file easily
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# --- SPLIT & NAVIGATION ---
# Split panes using | and - (and stay in the current directory)
bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
unbind '"'
unbind '%'

# new window in current path
bind c new-window -c "#{pane_current_path}"

# Enable mouse mode (clickable windows, panes, resizable)
set -g mouse on

# --- WINDOW & PANE MANAGEMENT ---
# Start window and pane numbering at 1 (matches keyboard order)
set -g base-index 1
set -g pane-base-index 1  # Fix: syncs pane numbering with window numbering

# Renumber windows automatically when one is closed
set -g renumber-windows on

# --- VISUAL & TERMINAL SETTINGS ---
# Set the default terminal mode to 256 colors
set -g default-terminal "tmux-256color"

# Enable TrueColor support (fix for weird colors in Vim/Neovim)
set -as terminal-features ",xterm-256color:RGB"

# undercurl support?  may disable this later
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# stay in tmux when session closes
set -g detach-on-destroy off

# Set status bar position to top
set -g status-position top

# Redraw status bar every 5 seconds
set -g status-interval 5

# --- PERFORMANCE & HISTORY ---
# Increase scrollback buffer
set -g history-limit 50000

# Fix delay in Vim (tmux-sensible sets this, but explicit 0 is safer for vim users)
set -s escape-time 0

# --- COPY MODE (VIM STYLE) ---
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# popup tools
# session switching - ctrl-j
# bind j display-popup -E "tmux-session-switcher" <- problem with this, not using it for now

# file picker - ctrl+f
bind C-f display-popup -E "tmux-file-picker"

# tmux bro - ctrl+t
bind C-t display-popup -E "tmux-bro"

# other session operations
bind S command-prompt 'rename-session %%'
bind N new-session

#opening projects as a window
bind C-o display-popup -E "tmux-zoxide-window"

# slightly different color for active pane
set-window-option -g window-style 'bg=#101010'
set-window-option -g window-active-style 'bg=#151515'

set -g pane-border-style fg=colour238,bg=#101010
set -g pane-active-border-style fg=colour113,bg=#151515

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Set window text to the current folder name
set -g @catppuccin_window_default_text " #{b:pane_current_path}"
set -g @catppuccin_window_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_text " #{b:pane_current_path}"

# Load catppuccin
run ~/.tmux/plugins/tmux/catppuccin.tmux


# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux


# --- PLUGINS ---
# Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin '/tmux-plugins/tmux-cpu'
set -g @plugin '/tmux-plugins/tmux-battery'

# Theme
set -g @plugin 'catppuccin/tmux'

# Persistence (Save/Restore sessions)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
#set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
