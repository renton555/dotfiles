[defaults]
# Use the local inventory file in this folder
inventory = inventory.ini

# Tell Ansible to run our script to fetch the vault password from Bitwarden vault_password_file = ./get-vault-pass.sh

# Stop Ansible from creating those annoying .retry files in your project
retry_files_enabled = False

# Automatically skip host key checking (Convenient for WSL/Home Labs)
host_key_checking = False

# Increase the number of parallel processes (Useful as your lab grows)
forks = 10

# Store roles in a local folder to keep things organized
roles_path = ./roles

[privilege_escalation]
# Default to using sudo for tasks that require it
become = True become_method = sudo become_user = root become_ask_pass = False

[ssh_connection]
# Optimize SSH for faster execution
pipelining = True control_path = /tmp/ansible-ssh-%%h-%%p-%%r
