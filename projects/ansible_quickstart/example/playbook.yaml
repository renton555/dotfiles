- name: My First Windows Playbook
  hosts: myhosts
  tasks:
    - name: Create a test directory on the C drive
      ansible.windows.win_file:
        path: C:\temp\ansible_test
        state: directory

    - name: Have Windows say hello
      ansible.windows.win_shell: Write-Output "Hello from Ansible! The connection is working."
      register: shell_result

    - name: Display the message back to WSL
      ansible.builtin.debug:
        var: shell_result.stdout_lines
